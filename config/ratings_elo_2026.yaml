# World Football Elo ratings + official draw for the 2026 FIFA World Cup field.
#
# Provenance:
#   elo (source: snapshot) : eloratings.net via Wikipedia data module
#                            "Module:SportsRankings/data/World_Football_Elo_Ratings",
#                            updated 2026-06-01.
#   elo (source: approx)   : NOT in the 2026-06-01 top-50 snapshot; plausible placeholder
#                            for a lower-ranked qualifier. The design analysis relies on
#                            the synthetic concentration sweep and on the *spread* of the
#                            real field, both robust to +/-50 Elo on these teams.
#   pot                    : official draw pots (FIFA, 2025-12-05 draw).
#   group                  : official final group assignment (FIFA, 2025-12-05 draw;
#                            Mexico->A, Canada->B, USA->D confirmed against FIFA).
#
# Pot membership is by FIFA world ranking with host seeding, NOT by Elo, so it does not
# track the Elo column (e.g. Norway is Pot 3 despite a high Elo).

meta:
  source_snapshot_date: "2026-06-01"
  elo_divisor: 400
  notes: "Group/pot per official 2025-12-05 draw; 14 ratings are approx placeholders."

